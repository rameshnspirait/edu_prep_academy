name: edu_prep_academy
description: "A new Flutter project."

publish_to: "none"

version: 1.0.0+1

environment:
  sdk: ^3.10.3

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  firebase_core: ^4.3.0
  firebase_auth: ^6.1.3
  cloud_firestore: ^6.1.1
  firebase_storage: ^13.0.5
  dio: ^5.9.2
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0
  flutter_pdfview: ^1.4.4
  intl: ^0.20.2
  google_fonts: ^7.0.2
  fl_chart: ^1.2.0
  pdf: ^3.11.3
  printing: ^5.14.2
  syncfusion_flutter_pdfviewer: ^32.1.23
  path_provider: ^2.1.5
  percent_indicator: ^4.2.5
  pinput: ^6.0.1
  lottie: ^3.3.3
  firebase_app_check: ^0.4.1+4
  file_picker: ^11.0.2
  csv: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7
  vibration: ^3.1.8
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  share_plus: ^12.0.2
  google_sign_in: 6.2.1

flutter_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "white" # optional for Android adaptive icon
  adaptive_icon_foreground: "assets/images/logo.png"

flutter_native_splash:
  color: "#1E3A8A" # main splash background

  image: assets/images/logo.png

  android: true
  ios: true
  web: false

  android_gravity: center
  ios_content_mode: center

  # 🔥 IMPORTANT (Android 12+)
  android_12:
    image: assets/images/logo.png
    icon_background_color: "#1E3A8A"

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.6

  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
